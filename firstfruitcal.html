<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .calender-section{
            padding:40px;
            text-align:center;
            background: #f9f9f9;

        }
        .calender-section h2{
            margin-bottom:24px;
            font-size: 2.4rem;
            color:rgb(11, 19, 19);
            
        }
        .calender-section h2:hover{
            color: blue;
        }
        .calender-section table{
            width:100%;
            border-collapse:collapse;

        }
        .calender-section th,td{
            background: #ddd;
            border:1px solid #fff;
            padding:12px;
        }
        .calender-section th,td:hover{
            background: black;
            color:white;
        }
        .calender-section th{
            background: rgb(228, 19, 214);
            color:#fff;
        }
        .calender-section th:hover{
            background-color: purple;
        }
    </style>
</head>
<body>
    <div class="calender-section">
        <h2>First Fruits Calender of Activities</h2>
        <table>
            <thead>
                <tr>
                    <th>Date</th>
                    <th>Activity</th>
                    <th>Event</th>
                </tr>

            </thead>
            <tbody>
                <tr>
                    <td>Oct 23,2025</td>
                    <td>Voluteer Activities</td>
                    <td>Nyachwa Area</td>
                </tr>
                <tr>
                    <td>Nov 7,2025</td>
                    <td>Outreach programs</td>
                    <td>Kisumu Market</td>
                </tr>
                <tr>
                    <td>Nov 14,2025</td>
                    <td>Community Visitation</td>
                    <td>Kisumu Ndogo</td>
                </tr>
            </tbody>
        </table>
    </div>
</body>
</html>
